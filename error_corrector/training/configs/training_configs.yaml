text_model: "meta-llama/Llama-3.2-1B-Instruct"
audio_model: "openai/whisper-large-v3-turbo"

# Dataset configuration
# train_dataset_args.max_samples controls how many samples to use (-1 = all)
# The dataset path is currently hardcoded to error_corrector/data/sample_custom_data/samples.jsonl
train_dataset_args:
  max_samples: -1  # Use all ~31k samples

# Batch size - adjust based on your GPU memory
# With 4x GPUs and split_batches=True, effective per-GPU batch = batch_size
batch_size: 185 # Adjust based on GPU memory

# Training epochs - set max_steps to -1 to use num_epochs instead
num_epochs: 1
max_steps: -1  # Set to -1 to use num_epochs (when >0, max_steps overrides num_epochs)

# Gradient accumulation for larger effective batch size
grad_accum_steps: 2  # Effective batch = batch_size * grad_accum_steps = 64

# train_sets/val_sets are required by config but currently ignored
# (dataset is loaded from hardcoded path in prepare_dataset)
train_sets:
  - name: sample_data

val_sets:
  - name: sample_data

# Validation settings
val_dataset_args:
  max_samples: 256  # Use 256 samples for validation split

do_eval: false

num_workers: 0

# Validation and save frequency
val_steps: 500      # Validate every 500 steps
save_steps: 0.5     # Save checkpoint at 50% and 100% (fractional = percentage)
logging_steps: 50   # Log every 50 steps

report_logs_to: []
# Learning rate - IMPORTANT: Use a much smaller LR for finetuning LLMs
# 1e-3 is way too high and causes model collapse (always predicting EOS)
# Typical LLM finetuning uses 1e-5 to 5e-5
lr: 5.e-4
lr_scheduler: "cosine"
lr_scheduler_kwargs: {}
lr_warmup_steps: 100

# Use CrossEntropy loss instead of KL divergence
loss_config:
  loss_function: "CrossEntropy"

